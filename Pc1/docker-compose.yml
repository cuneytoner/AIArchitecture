services:
  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_image_comfyui
    ports:
      - "8188:8188"
    # [DÜZELTME]: Dockerfile önbelleğini baypas ederek düşük VRAM ve FP8 kuantizasyon komutlarını çekirdekten dayatıyoruz
    command: ["python3", "main.py", "--listen", "0.0.0.0", "--port", "8188", "--lowvram", "--fp8_e4m3fn-textenc", "--fp8_e4m3fn-unet", "--fp16-vae"]
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:128,expandable_segments:True
      - CUDA_LAUNCH_BLOCKING=1
      - TRITON_CACHE_DIR=/workspace/.triton
      - HOME=/workspace
    volumes:
      - ./comfyui_data/models:/workspace/models
      - ./comfyui_data/input:/workspace/input
      - ./comfyui_data/output:/workspace/output
      - ./shared_3d_data:/workspace/shared_3d_data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

  blender_api:
    image: linuxserver/blender:version-3.6.4
    container_name: ai_3d_blender
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Istanbul
    volumes:
      # Sadece klasörü bağlıyoruz, script zaten bu klasörün içinde duracak
      - ./shared_3d_data:/3d_workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "3001:3000"
    restart: always
  # [YENİ]: PC-1 Docker hareketlerini PC-2 Portainer Paneline Raporlayan Akıllı Ajan Servisi
  # [DÜZELTME]: Edge tünel hatasını bitiren resmi direkt Portainer Ajanı
 # [KESİN ÇÖZÜM]: Pop!_OS 22.04 Docker API'si (1.42) ile %100 uyumlu çalışan kararlı LTS Ajan sürümü
  portainer_agent:
    image: portainer/agent:latest
    container_name: ai_portainer_edge_agent_pc1
    environment:
      - EDGE=1
      - EDGE_SERVER_URL=http://192.168.50.2:9000
      # [MÜHÜRLEME]: Portainer Admin panelinden (+ Add Environment -> Edge Agent) aldığınız o uzun anahtar metnini (Token) buraya yapıştırın
      - EDGE_ID=e96532ae-d431-4ed4-b2e1-57a10376ba7e
      - EDGE_KEY=aHR0cDovLzE5Mi4xNjguNTAuMjo5MDAwfDE5Mi4xNjguNTAuMjo4MDAwfEo1cS9OazYzT1FYeW55RWE5ZDZBN0JiZUlBZ051MExYWTBRZ0loejVORjQ9fDU
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - ./portainer_edge_data:/data
    restart: always

    
  redis:
    image: redis:7-alpine
    container_name: ai_queue_redis
    ports:
      - "6379:6379"
    restart: always
