model_list:
  # 🤖 AJAN 1: Ana Kod Yazarı ve Refaktör İşçisi (PC-1)
  - model_name: akilli-kod-asistani
    litellm_params:
      model: ollama/qwen2.5-coder:14b
      api_base: http://192.168.50.1:11434
      tpm: 100000
      rpm: 1000

  # 🧠 AJAN 2: Ağır Mimari Planlama ve Algoritma Tasarımcısı (PC-2)
  - model_name: planlama-ve-bellek
    litellm_params:
      model: ollama/llama3.3:70b
      api_base: http://localhost:11434

  # 🔍 AJAN 3: Hızlı Debug, Log Analizi ve Hata Yakalama Uzmanı (PC-1)
  - model_name: hata-ayiklama-asistani
    litellm_params:
      model: ollama/deepseek-coder:6.7b
      api_base: http://192.168.50.1:11434

  # 🎨 GÖRSEL MOTORU: OpenAI standartlarında ComfyUI API rotası (PC-1)
  - model_name: cluster-image-engine
    litellm_params:
      model: openai/comfyui
      api_base: http://192.168.50.1:8188

router_settings:
  routing_strategy: simple-shuffle
  enable_jwt_auth: false

general_settings:
  master_key: local-cluster-key
