version: '3.8'

# [KRİTİK DÜZELTME]: Tüm servisleri bu anahtarın altında ve 2 boşluk içeride topluyoruz!
services:

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ai_router_litellm
    ports:
      - "8001:8000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    command: [ "--config", "/app/config.yaml", "--port", "8000" ]
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: ai_db_postgres
    environment:
      POSTGRES_USER: cuneyt
      POSTGRES_PASSWORD: local-cluster-db-pass
      POSTGRES_DB: ai_knowledge_base
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_memory_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: always

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai_chat_interface
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://litellm:8000/v1
      - OPENAI_API_KEY=local-cluster-key
      - WEBUI_SECRET_KEY=super_secure_offline_secret
      - ENABLE_OLLAMA_API=False
      - ENABLE_OPENAI_API=True
      - ENABLE_IMAGE_GENERATION=True
      - IMAGE_GENERATION_ENGINE=openai
      - IMAGE_GENERATION_MODEL=cluster-image-engine
      - OPENAI_IMAGE_API_BASE_URL=http://litellm:8000/v1
    volumes:
      - ./openwebui_data:/app/backend/data
    depends_on:
      - litellm
    restart: always

  portainer:
    image: portainer/portainer-ce:latest
    container_name: ai_memory_portainer
    ports:
      - "9000:9000"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer_data:/data
    restart: always

  celery-flower:
    image: mher/flower:latest
    container_name: ai_memory_celery_flower
    environment:
      - CELERY_BROKER_URL=redis://192.168.50.1:6379/0
    ports:
      - "5555:5555"
    restart: always

  # 📊 PROMETHEUS: PC-1 ve PC-2 donanım verilerini toplayan zaman serisi veritabanı
  prometheus:
    image: prom/prometheus:latest
    container_name: ai_monitor_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  # 🎨 GRAFANA: RAM, VRAM ve Task durumlarını şık widget'larla gösteren merkezî panel
  grafana:
    image: grafana/grafana:latest
    container_name: ai_monitor_grafana
    ports:
      - "3002:3000" # Open-WebUI 3000'de olduğu için Grafana'yı dışarıya 3002'den açıyoruz
    volumes:
      - ./grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=local-cluster-grafana-pass
    restart: always
